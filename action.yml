name: "Actbot Action"
description: "A simple GitHub Action"
author: "ShyunnY"

inputs:
  token:
    description: "GitHub token"
    required: true
    default: ${{ github.token }}

runs:
  using: "docker"
  image: "Dockerfile"
  env:
    token: ${{ inputs.token }}

branding:
  color: blue
  icon: activity
